<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profit Margin Calculator</title>
  <link rel="stylesheet" href="style.css">    
</head>
<body>
  <header>
    <h1>Adusei Website</h1>
  </header>
  <nav>
       <a href="index.html">Home</a>
       <a href="portfolio.html">Portfolio</a>
       <a href="trivia.html">Trivia</a>
  </nav>
  <div class="layout">
    <aside class="left-sidebar">
      <h3>Useful</h3>
      <ul>
        <li><a href="https://developer.mozilla.org" target="_blank">MDN Web Docs</a></li>
        <li><a href="https://www.w3schools.com" target="_blank">W3Schools</a></li>
      </ul>
    </aside>
    <main>
      <h2>Profit Margin Calculator</h2>
      <p>Enter your cost price and selling price to calculate profit and margin.</p>

      <label for="cost">Cost Price (¥):</label>
      <input type="number" id="cost">

      <label for="selling">Selling Price (¥):</label>
      <input type="number" id="selling">

      <button onclick="calculateMargin()">Calculate</button>

      <p id="result"></p>
    </main>
    <aside class="right-sidebar">
        <h3>Get in Touch</h3>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" required>
            <label for="message">Message:</label>
            <textarea id="message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </aside>
  </div>
  <footer>
      <p>Created: July 2026 | <a href="https://github.com/sixadmedia" target="_blank">GitHub</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
